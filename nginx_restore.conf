server {
    listen 80;
    server_name vjgu.online;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vjgu.online;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/vjgu.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vjgu.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://social_app:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /videos/ {
        alias /app/generated_media/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        
        types {
            video/mp4 mp4;
            video/quicktime mov;
            image/png png;
            image/jpeg jpg jpeg;
        }
    }

    location /assets/ {
        alias /app/assets/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
