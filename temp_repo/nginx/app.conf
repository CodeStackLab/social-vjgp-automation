server {
    listen 80;
    server_name localhost vjgu.online;
    server_tokens off;

    # Increase client max body size for video uploads
    client_max_body_size 100M;

    # Main application
    location / {
        proxy_pass http://app:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve generated media files directly (videos, images, temp)
    location /videos/ {
        alias /app/generated_media/;
        autoindex on;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        
        types {
            video/mp4 mp4;
            video/quicktime mov;
            image/png png;
            image/jpeg jpg jpeg;
        }
    }

    location /assets/ {
        alias /app/assets/;
        autoindex on;
        try_files $uri @permanent_assets;
    }
    
    location @permanent_assets {
        rewrite ^/assets/(.*)$ /generated_media/$1 last;
    }
    
    location /generated_media/ {
        alias /app/generated_media/;
        autoindex on;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        
        types {
            video/mp4 mp4;
            video/quicktime mov;
            image/png png;
            image/jpeg jpg jpeg;
        }
    }
}
